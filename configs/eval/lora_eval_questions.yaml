# Eval metrikleri — eşikler
eval_thresholds:
  math_correctness: 0.90
  statistics_correctness: 0.85
  logic_consistency: 0.85
  answer_structure: 0.85
  source_grounding: 0.80
  hallucination_risk: 0.05   # max kabul — düşük olmalı
  uncertainty_handling: 0.85
  rag_context_usage: 0.80
  risk_warning_present: 0.80
  refusal_when_uncertain: 0.85

# Kabul kriterleri
acceptance_criteria:
  rag_plus_lora_beats_rag_only: true   # RAG+LoRA >= RAG-only
  math_correctness_no_regression: true
  hallucination_risk_no_increase: true
  model_not_overconfident: true
  admits_uncertainty_when_no_source: true
