# LoRA Evaluation Question Bank — 50 soru, 6 alan
# Achilles LoRA eval set — deterministik, LLM olmadan yapı doğrulanabilir.
# Her soru: id, domain, level, question, expected_key_points, forbidden_errors,
#            requires_rag, scoring_rubric

mathematics:
  - id: math_001
    domain: mathematics
    level: level_1
    question: "10.000 USDT sermaye, %1 risk ve %2 stop mesafesi ile pozisyon büyüklüğü nedir?"
    expected_key_points:
      - "Maksimum risk = 10.000 × 0.01 = 100 USDT"
      - "Pozisyon büyüklüğü = 100 / 0.02 = 5.000 USDT"
    forbidden_errors:
      - "stop ve risk oranlarını birbirine karıştırmak"
      - "komisyonu hesaba katmadan kesin kazanç demek"
    requires_rag: false
    scoring_rubric:
      math_correctness: 1.0
      step_by_step: 0.5

  - id: math_002
    domain: mathematics
    level: level_1
    question: "RSI formülü nedir? RS değeri nasıl hesaplanır?"
    expected_key_points:
      - "RSI = 100 - 100/(1+RS)"
      - "RS = ortalama kazanç / ortalama kayıp"
      - "14 periyot varsayılan"
    forbidden_errors:
      - "RS = kayıp / kazanç (ters çevirme hatası)"
    requires_rag: true
    scoring_rubric:
      math_correctness: 1.0
      source_grounding: 0.5

  - id: math_003
    domain: mathematics
    level: level_2
    question: "Sharpe ratio 1.5 olan bir strateji iyi midir? Ne anlama gelir?"
    expected_key_points:
      - "Sharpe = (getiri - risksiz faiz) / standart sapma"
      - "1.5 genel olarak kabul edilebilir üzeri"
      - "Periyot ve benchmark'a göre değişir"
    forbidden_errors:
      - "kesinlikle iyi strateji demek"
      - "risksiz faizi yok saymak"
    requires_rag: false
    scoring_rubric:
      uncertainty_handling: 1.0
      math_correctness: 0.8

  - id: math_004
    domain: mathematics
    level: level_2
    question: "Kelly criterion ile pozisyon büyüklüğü nasıl hesaplanır?"
    expected_key_points:
      - "f = (bp - q) / b formülü"
      - "b = kazanç/kayıp oranı, p = kazanma olasılığı, q = 1-p"
      - "Pratikte yarı-Kelly (f/2) önerilir"
    forbidden_errors:
      - "Kelly'yi her zaman tam uygulamayı önermek"
      - "olasılık tahmininin belirsizliğini atlamak"
    requires_rag: false
    scoring_rubric:
      math_correctness: 1.0
      risk_warning_present: 0.8

  - id: math_005
    domain: mathematics
    level: level_3
    question: "Bir portföyde iki varlık var: korelasyon 0.3, her birinin volatilitesi %20. Portföy volatilitesi nedir? (eşit ağırlık)"
    expected_key_points:
      - "σ_p = sqrt(w1²σ1² + w2²σ2² + 2w1w2ρσ1σ2)"
      - "= sqrt(0.25×0.04 + 0.25×0.04 + 2×0.5×0.5×0.3×0.04)"
      - "≈ %16.4"
    forbidden_errors:
      - "volatiliteleri basitçe ortalama almak"
      - "korelasyonu hesaba katmamak"
    requires_rag: false
    scoring_rubric:
      math_correctness: 1.0
      step_by_step: 1.0

  - id: math_006
    domain: mathematics
    level: level_0
    question: "Basit hareketli ortalama (SMA) nedir?"
    expected_key_points:
      - "Son N periyodun kapanış fiyatlarının aritmetik ortalaması"
      - "SMA(n) = (P1 + P2 + ... + Pn) / n"
    forbidden_errors:
      - "ağırlıklı ortalama ile karıştırmak"
    requires_rag: false
    scoring_rubric:
      answer_structure: 1.0

  - id: math_007
    domain: mathematics
    level: level_2
    question: "Maximum drawdown nedir ve nasıl hesaplanır?"
    expected_key_points:
      - "Tepe değerinden en dip değere düşüş yüzdesi"
      - "MDD = (Tepe - Dip) / Tepe"
    forbidden_errors:
      - "kümülatif getiri ile karıştırmak"
    requires_rag: false
    scoring_rubric:
      math_correctness: 1.0

  - id: math_008
    domain: mathematics
    level: level_3
    question: "EMA(12) ve EMA(26) arasındaki MACD sinyali nasıl oluşur?"
    expected_key_points:
      - "MACD Line = EMA(12) - EMA(26)"
      - "Signal Line = EMA(9) of MACD Line"
      - "Histogram = MACD - Signal"
    forbidden_errors:
      - "SMA ile EMA'yı karıştırmak"
    requires_rag: false
    scoring_rubric:
      math_correctness: 1.0
      step_by_step: 0.8

  - id: math_009
    domain: mathematics
    level: level_1
    question: "Leverage 10x kullanırken %10 fiyat düşüşü ne anlama gelir?"
    expected_key_points:
      - "Sermayenin tamamı likide olabilir"
      - "Likidation = (1/leverage) hareket yeterli"
    forbidden_errors:
      - "leverage etkisini küçümsemek"
      - "komisyon/funding rate'i atlamak"
    requires_rag: false
    scoring_rubric:
      risk_warning_present: 1.0
      math_correctness: 1.0

  - id: math_010
    domain: mathematics
    level: level_4
    question: "Sortino ratio 2.3 ve Sharpe ratio 1.1. Bu fark ne anlama gelir?"
    expected_key_points:
      - "Sortino yalnızca negatif sapmaları cezalandırır"
      - "Sortino > Sharpe → ağırlıklı upside volatilite"
      - "Out-of-sample testi şart"
    forbidden_errors:
      - "kesinlikle iyi strateji demek"
      - "out-of-sample testi atlamak"
    requires_rag: false
    scoring_rubric:
      math_correctness: 1.0
      uncertainty_handling: 1.0

